<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nighthub - Đăng nhập</title>
    <style>
        /* ================= CÀI ĐẶT BIẾN MÀU SẮC ================= */
        :root {
            --c-blue-1: #32455F;
            --c-blue-2: #1A324A;
            --c-darkest: #07101C;
            
            --text-main: #ffffff;
            --text-muted: #64748b; /* Xám nhạt cho chữ phụ */
            --accent-blue: #38bdf8; /* Xanh neon cho chữ Đăng ký */
            
            --card-bg: rgba(15, 23, 36, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        /* ================= RESET CSS ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, 
                var(--c-blue-1) 17%, 
                var(--c-blue-2) 35%, 
                var(--c-darkest) 62%, 
                var(--c-blue-2) 84%
            );
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Nút quay lại trang chủ ở góc trái trên cùng */
        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        .back-link svg {
            width: 18px;
            height: 18px;
        }

        /* ================= LOGO SECTION ================= */
        .logo-section {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon svg {
            width: 50px;
            height: 50px;
            fill: #4DA8DA;
        }


        /* ================= LOGIN CARD ================= */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 40px 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .card-title {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--text-main);
        }

        /* ================= FORM NHẬP LIỆU ================= */
        .login-form {
            display: flex;
            flex-direction: column;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: #94a3b8;
            display: flex;
            pointer-events: none;
        }

        .input-icon svg {
            width: 18px;
            height: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border-radius: 8px; /* Hình chữ nhật bo góc nhẹ */
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: #64748b;
        }

        .input-group input:focus {
            border-color: var(--accent-blue);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }
        
        .input-group input:focus + .input-icon {
            color: var(--accent-blue);
        }

        /* --- Quên mật khẩu --- */
        .forgot-pwd {
            text-align: right;
            margin-bottom: 20px;
            margin-top: -5px;
        }

        .forgot-pwd a {
            color: var(--text-muted); /* Màu xám nhạt */
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
        }

        .forgot-pwd a:hover {
            color: #cbd5e1;
        }

        /* --- Nút Đăng Nhập Chính --- */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background-color: #334764; /* Xanh Navy nhám giống ảnh */
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .btn-submit:hover {
            background-color: #40597a;
            transform: translateY(-2px);
        }

        /* ================= ĐƯỜNG KẺ CHIA CẮT ================= */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 25px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        /* ================= MẠNG XÃ HỘI (XẾP DỌC) ================= */
        .social-login {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .social-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Chỉnh CSS để dùng ảnh thay vì SVG */
        .social-btn img { 
            width: 20px; 
            height: 20px; 
            object-fit: contain;
        }

        /* Facebook */
        .social-btn.fb { background: #1877F2; color: #ffffff; }

        /* Google */
        .social-btn.gg { background: #ffffff; color: #000000; }
        
        /* Apple */
        .social-btn.ap { background: #000000; color: #ffffff; border-color: #333; }

        /* ================= ĐĂNG KÝ ================= */
        .register-text {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
        }

        .register-text a {
            color: var(--accent-blue); /* Màu xanh sáng */
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: opacity 0.2s;
        }

        .register-text a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Responsive cho thiết bị di động nhỏ */
        @media (max-width: 480px) {
            .login-card {
                background: transparent;
                border: none;
                box-shadow: none;
                padding: 20px;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
            .back-link {
                top: 20px;
                left: 20px;
            }
        }
        .logo { display: flex; align-items: center; text-decoration: none; }
        .logo img { height: 150px; width: auto; object-fit: contain; }
    </style>
</head>
<body>

    <!-- Nút quay lại -->
    <a href="home.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Trang chủ
    </a>

    <!-- Logo Phía trên Form -->
    <div class="logo-section">
        <div class="logo-wrapper">
            <div class="logo img">
                <img src="../images/logo.png" alt="Phim liên quan 2">
            </div>
        </div>
    </div>

    <!-- Khung Đăng Nhập -->
    <div class="login-card">
        <h2 class="card-title">Đăng Nhập</h2>
        
        <form class="login-form">
            
            <!-- Email / SĐT -->
            <div class="input-group">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </span>
                <input type="text" placeholder="Email hoặc số điện thoại">
            </div>

            <!-- Password -->
            <div class="input-group">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </span>
                <input type="password" placeholder="Mật khẩu">
            </div>

            <!-- Quên mật khẩu -->
            <div class="forgot-pwd">
                <a href="#">Quên mật khẩu?</a>
            </div>

            <!-- Nút Đăng nhập -->
            <button type="button" class="btn-submit">Đăng Nhập</button>

            <!-- Line chia cắt -->
            <div class="divider">
                <span>Hoặc đăng nhập bằng</span>
            </div>

            <!-- Nút đăng nhập MXH (Đã thay bằng thẻ img) -->
            <div class="social-login">
                <!-- FB -->
                <button type="button" class="social-btn fb">
                    <img src="../images/logo_fb.webp" alt="Facebook Logo">
                    Đăng nhập bằng Facebook
                </button>
                
                <!-- GG -->
                <button type="button" class="social-btn gg">
                    <img src="../images/logo_gg.png" alt="Google Logo">
                    Đăng nhập bằng Google
                </6button>
                
                <!-- Apple -->
                <button type="button" class="social-btn ap">
                    <img src="../images/logo_apple.png" alt="Apple Logo">
                    Đăng nhập bằng Apple
                </button>
            </div>

            <!-- Footer text -->
            <div class="register-text">
                Chưa có tài khoản? <a href="#">Đăng ký ngay</a>
            </div>
            
        </form>
    </div>

</body>
</html>
