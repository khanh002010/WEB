<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamflix - Đăng nhập</title>
    <style>
        /* ================= CÀI ĐẶT BIẾN MÀU SẮC ================= */
        :root {
            /* Dải màu nền đồng bộ với hệ thống */
            --c-blue-1: #32455F;
            --c-blue-2: #1A324A;
            --c-darkest: #07101C;
            
            --text-main: #ffffff;
            --text-muted: #8e9fb1;
            --accent-red: #ff0000; /* Màu đỏ cho checkbox và chữ Đăng ký */
            --input-bg: rgba(0, 0, 0, 0.4);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        /* ================= RESET CSS ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Nền xanh Dark Blue gradient chuẩn hệ thống */
            background: linear-gradient(135deg, 
                var(--c-blue-1) 17%, 
                var(--c-blue-2) 35%, 
                var(--c-darkest) 62%, 
                var(--c-blue-2) 84%
            );
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================= CONTAINER ĐĂNG NHẬP ================= */
        .login-container {
            width: 100%;
            max-width: 400px; /* Khóa kích thước giả lập màn hình Mobile */
            min-height: 100vh;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Căn giữa thành dạng thẻ (card) nếu xem trên màn hình lớn */
        @media (min-width: 450px) {
            .login-container {
                min-height: auto;
                height: 800px;
                border-radius: 30px;
                background-color: rgba(7, 16, 28, 0.4);
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                border: 1px solid rgba(255,255,255,0.05);
                backdrop-filter: blur(10px);
            }
        }

        /* ================= HEADER (Tiêu đề & Nút back) ================= */
        .login-header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 50px;
            margin-top: 10px;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .login-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ================= LOGO ================= */
        .logo-section {
            display: flex;
            justify-content: center;
            margin-bottom: 60px;
        }

        /* Logo giả lập NightHub */
        .logo-placeholder {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon svg {
            width: 45px;
            height: 45px;
            fill: #4DA8DA;
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 900;
            /* Hiệu ứng màu gradient cho chữ giống ảnh */
            background: linear-gradient(to right, #4DA8DA, #8A2BE2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        /* ================= FORM NHẬP LIỆU ================= */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1; /* Đẩy nội dung bên dưới xuống đáy */
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            color: var(--text-muted);
            display: flex;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            border-radius: 25px; /* Bo góc dạng viên thuốc */
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        .input-group input:focus {
            border-color: rgba(255,255,255,0.5);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        
        .input-group input:focus + .input-icon {
            color: var(--text-main);
        }

        /* ================= CHECKBOX (Remember me) ================= */
        .remember-section {
            display: flex;
            align-items: center;
            margin-top: -5px;
            margin-bottom: 10px;
        }

        .checkbox-container {
            display: block;
            position: relative;
            padding-left: 30px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            user-select: none;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 18px;
            width: 18px;
            background-color: transparent;
            border: 2px solid var(--accent-red); /* Viền màu đỏ nổi bật */
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .checkbox-container:hover input ~ .checkmark {
            background-color: rgba(255,0,0,0.1);
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--accent-red);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 5px;
            top: 1px;
            width: 4px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* ================= NÚT ĐĂNG NHẬP ================= */
        .btn-submit {
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            border: none;
            background-color: #ffffff;
            color: #000000;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-submit:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        /* ================= ĐƯỜNG KẺ CHIA CẮT ================= */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 25px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .divider:not(:empty)::before {
            margin-right: 15px;
        }

        .divider:not(:empty)::after {
            margin-left: 15px;
        }

        /* ================= MẠNG XÃ HỘI ================= */
        .social-login {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 15px; /* Bo góc hơi vuông nhẹ theo ảnh */
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .social-btn svg {
            width: 24px;
            height: 24px;
        }
        
        .social-btn.fb svg { fill: #1877F2; }
        .social-btn.gg svg { width: 22px; height: 22px; } /* Google nhiều màu tự SVG xử lý */
        .social-btn.ap svg { fill: #ffffff; }

        /* ================= ĐĂNG KÝ ================= */
        .register-text {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: auto; /* Đẩy xuống đáy */
        }

        .register-text a {
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .register-text a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="login-container">
        
        <!-- HEADER -->
        <header class="login-header">
            <a href="#" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h2>Đăng nhập</h2>
        </header>

        <!-- LOGO -->
        <div class="logo-section">
            <div class="logo-placeholder">
                <div class="logo-icon">
                    <!-- Icon cuộn phim mô phỏng logo NightHub -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19.8 3.2L16.2 5l1.6 3.2-3.6 1.8L12.6 6.8l-3.6 1.8 1.6 3.2-3.6 1.8L5.4 10.4 1.8 12.2l1.6 3.2-3.4 1.7L4 21.6l3.6-1.8-1.6-3.2 3.6-1.8 1.6 3.2 3.6-1.8-1.6-3.2 3.6-1.8 1.6 3.2 3.6-1.8z" opacity="0.3"/>
                        <circle cx="12" cy="12" r="7" />
                        <circle cx="12" cy="12" r="2" fill="#07101C"/>
                        <circle cx="16" cy="12" r="1" fill="#07101C"/>
                        <circle cx="8" cy="12" r="1" fill="#07101C"/>
                        <circle cx="12" cy="16" r="1" fill="#07101C"/>
                        <circle cx="12" cy="8" r="1" fill="#07101C"/>
                    </svg>
                </div>
                <div class="logo-text">NIGHTHUB</div>
            </div>
        </div>

        <!-- FORM -->
        <form class="login-form">
            <!-- Username/Email -->
            <div class="input-group">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </span>
                <input type="text" placeholder="Email / Phone number">
            </div>

            <!-- Password -->
            <div class="input-group">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </span>
                <input type="password" placeholder="Password">
            </div>

            <!-- Remember me (Có viền đỏ nổi bật) -->
            <div class="remember-section">
                <label class="checkbox-container">
                    Remember me
                    <input type="checkbox">
                    <span class="checkmark"></span>
                </label>
            </div>

            <!-- Nút submit -->
            <button type="button" class="btn-submit">Đăng nhập</button>

            <!-- Line chia cắt -->
            <div class="divider">
                <span>Đăng nhập với</span>
            </div>

            <!-- Đăng nhập mạng xã hội -->
            <div class="social-login">
                <!-- Facebook -->
                <a href="#" class="social-btn fb" title="Đăng nhập bằng Facebook">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                </a>
                
                <!-- Google -->
                <a href="#" class="social-btn gg" title="Đăng nhập bằng Google">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                </a>
                
                <!-- Apple -->
                <a href="#" class="social-btn ap" title="Đăng nhập bằng Apple">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.15 2.95.82 3.75 1.99-3.27 1.95-2.73 6.01.6 7.28-1.03 2.16-2.03 3.78-3 4.74zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.35 2.4-2.14 4.3-3.74 4.25z"/></svg>
                </a>
            </div>

            <!-- Nút đăng ký -->
            <div class="register-text">
                Bạn chưa có tài khoản? <a href="#">Đăng ký</a>
            </div>
        </form>

    </div>

</body>
</html>
