<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamflix - Đăng ký tài khoản</title>
    <style>
        /* ================= CÀI ĐẶT BIẾN MÀU SẮC ================= */
        :root {
            /* Dải màu chuẩn từ giao diện gốc */
            --c-blue-1: #32455F;
            --c-blue-2: #1A324A;
            --c-darkest: #07101C;
            
            --text-main: #ffffff; 
            --text-muted: #8b9db3; 
            
            /* Màu nền cho các ô nhập liệu (Input) */
            --input-bg: rgba(0, 0, 0, 0.45);
            
            /* Màu đỏ nhấn cho link Đăng nhập */
            --accent-red: #e50914; 
        }

        /* ================= RESET CSS ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Nền gradient y hệt như trang chủ và trang chi tiết */
            background: linear-gradient(135deg, 
                var(--c-blue-1) 17%, 
                var(--c-blue-2) 35%, 
                var(--c-darkest) 62%, 
                var(--c-blue-2) 84%
            );
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================= KHUNG ĐĂNG KÝ (FORM CONTAINER) ================= */
        .auth-container {
            width: 100%;
            max-width: 420px; /* Chiều rộng chuẩn cho form đăng nhập/đăng ký */
            padding: 40px 30px;
            border-radius: 24px;
            
            /* Kính mờ nhẹ để nổi bật form lên khỏi nền */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            
            margin: 20px;
        }

        /* --- HEADER & BACK BUTTON --- */
        .auth-header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 40px;
        }

        .back-btn {
            position: absolute;
            left: 0;
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            transition: transform 0.2s;
        }
        
        .back-btn:hover {
            transform: translateX(-3px);
        }

        .auth-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* --- LOGO NIGHTHUB --- */
        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 36px;
            font-weight: 900;
            font-family: 'Arial Black', Impact, sans-serif;
            /* Tạo màu xanh lam sáng cho chữ logo giống ảnh */
            background: linear-gradient(to bottom, #5B9AFF, #3A6DFF);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            line-height: 1;
        }

        /* --- FORM NHẬP LIỆU (INPUTS) --- */
        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px 16px 55px;
            border-radius: 30px; /* Bo tròn mạnh hai đầu */
            background-color: var(--input-bg);
            border: 1px solid transparent;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, background-color 0.3s;
        }

        .form-input::placeholder {
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-input:focus {
            border-color: rgba(91, 154, 255, 0.5); /* Sáng viền xanh nhẹ khi nhấp vào */
            background-color: rgba(0, 0, 0, 0.6);
        }

        /* --- NÚT ĐĂNG KÝ (SUBMIT) --- */
        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border-radius: 30px;
            border: none;
            background-color: var(--text-main);
            color: #000000;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
        }

        .submit-btn:hover {
            background-color: #e6e6e6;
            transform: scale(1.02);
        }

        /* --- THANH CHIA (DIVIDER) --- */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin: 30px 0 25px 0;
            font-weight: 500;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .divider:not(:empty)::before {
            margin-right: 15px;
        }

        .divider:not(:empty)::after {
            margin-left: 15px;
        }

        /* --- MẠNG XÃ HỘI (SOCIAL LOGINS) --- */
        .social-logins {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .social-btn {
            width: 65px;
            height: 50px;
            border-radius: 14px;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
        }

        .social-btn svg {
            width: 24px;
            height: 24px;
        }

        /* --- DÒNG CUỐI (FOOTER TEXT) --- */
        .auth-footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 700;
            margin-left: 4px;
            transition: text-decoration 0.2s;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
        
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- HEADER -->
        <div class="auth-header">
            <button class="back-btn" title="Quay lại">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div class="auth-title">Tạo tài khoản</div>
        </div>

        <!-- LOGO NIGHTHUB (Biểu tượng mô phỏng từ SVG) -->
        <div class="logo-section">
            <svg width="45" height="45" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Mô phỏng logo phim & hành tinh -->
                <circle cx="50" cy="50" r="45" stroke="#5B9AFF" stroke-width="4" opacity="0.3"/>
                <path d="M50 5C25.147 5 5 25.147 5 50" stroke="#5B9AFF" stroke-width="4" stroke-linecap="round"/>
                <circle cx="50" cy="50" r="25" fill="#3A6DFF" opacity="0.8"/>
                <circle cx="50" cy="50" r="10" fill="#ffffff"/>
                <rect x="25" y="30" width="10" height="40" fill="#5B9AFF" rx="2" transform="rotate(-20 25 30)"/>
            </svg>
            <div class="logo-text">NIGHTHUB</div>
        </div>

        <!-- FORM ĐĂNG KÝ -->
        <form action="#" method="POST">
            
            <!-- Email -->
            <div class="input-group">
                <div class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>
                <input type="email" class="form-input" placeholder="Email" required>
            </div>

            <!-- Mật khẩu -->
            <div class="input-group">
                <div class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <input type="password" class="form-input" placeholder="Mật khẩu" required>
            </div>

            <!-- Xác nhận mật khẩu -->
            <div class="input-group">
                <div class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <input type="password" class="form-input" placeholder="Xác nhận lại mật khẩu" required>
            </div>

            <!-- Số điện thoại -->
            <div class="input-group">
                <div class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                    </svg>
                </div>
                <input type="tel" class="form-input" placeholder="Số điện thoại" required>
            </div>

            <!-- Nút Đăng ký -->
            <button type="submit" class="submit-btn">Đăng ký</button>
            
        </form>

        <!-- DIVIDER -->
        <div class="divider">Đăng nhập với</div>

        <!-- MẠNG XÃ HỘI -->
        <div class="social-logins">
            <!-- Facebook -->
            <button class="social-btn" title="Đăng nhập bằng Facebook">
                <svg viewBox="0 0 24 24" fill="#1877F2">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
            </button>
            
            <!-- Google -->
            <button class="social-btn" title="Đăng nhập bằng Google">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
            </button>
            
            <!-- Apple -->
            <button class="social-btn" title="Đăng nhập bằng Apple">
                <svg viewBox="0 0 24 24" fill="#ffffff">
                    <path d="M17.05 16.57c-.64 1.36-1.32 2.76-2.79 2.81-1.41.05-1.89-.83-3.48-.83-1.61 0-2.14.8-3.46.85-1.44.05-2.26-1.54-2.91-2.91-1.36-2.87-2.4-8.15-.99-11.75.7-1.78 2.21-2.91 3.86-2.94 1.39-.03 2.68.96 3.51.96.82 0 2.37-1.18 4.04-1.01 1.4.07 2.67.61 3.5 1.83-2.91 1.76-2.42 5.92.51 7.07-.67 1.81-1.44 3.75-2.8 5.92zm-3.52-14.8c-.7.86-1.75 1.44-2.86 1.32-.15-1.07.35-2.2 1-3.04.68-.86 1.83-1.48 2.85-1.35.15 1.13-.27 2.19-.99 3.07z"/>
                </svg>
            </button>
        </div>

        <!-- FOOTER TEXT -->
        <div class="auth-footer">
            Bạn đã có tài khoản rồi? <a href="#">Đăng nhập</a>
        </div>

    </div>

</body>
</html>
