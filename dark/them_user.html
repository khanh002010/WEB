<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamflix - Thêm Người Dùng</title>
    <style>
        /* ================= CÀI ĐẶT BIẾN MÀU SẮC ================= */
        :root {
            /* Dải màu nền đồng bộ với hệ thống */
            --c-blue-1: #32455F;
            --c-blue-2: #1A324A;
            --c-darkest: #07101C;
            
            --text-main: #ffffff;
            --text-muted: #8e9fb1;
            --accent-red: #ff0000;
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        /* ================= RESET CSS ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Nền xanh Dark Blue gradient chuẩn hệ thống */
            background: linear-gradient(135deg, 
                var(--c-blue-1) 17%, 
                var(--c-blue-2) 35%, 
                var(--c-darkest) 62%, 
                var(--c-blue-2) 84%
            );
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================= CONTAINER ================= */
        .profile-container {
            width: 100%;
            max-width: 400px; /* Khóa kích thước giả lập màn hình Mobile */
            min-height: 100vh;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Căn giữa thành dạng thẻ (card) nếu xem trên màn hình lớn */
        @media (min-width: 450px) {
            .profile-container {
                min-height: auto;
                height: 800px;
                border-radius: 30px;
                background-color: rgba(7, 16, 28, 0.4);
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                border: 1px solid rgba(255,255,255,0.05);
                backdrop-filter: blur(10px);
            }
        }

        /* ================= HEADER ================= */
        .profile-header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 50px;
            margin-top: 10px;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .profile-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ================= AVATAR SECTION ================= */
        .avatar-section {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .avatar-wrapper:hover {
            transform: scale(1.05);
        }

        .avatar-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #ffffff; /* Vòng tròn trắng */
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Nút (+) nhỏ màu đỏ ở góc dưới Avatar */
        .avatar-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 26px;
            height: 26px;
            border: 2px solid var(--accent-red);
            background-color: var(--c-darkest); /* Trùng với màu nền để tạo cảm giác trong suốt */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-badge::before, .avatar-badge::after {
            content: '';
            position: absolute;
            background-color: var(--accent-red);
        }

        .avatar-badge::before { width: 10px; height: 2px; } /* Thanh ngang */
        .avatar-badge::after { width: 2px; height: 10px; } /* Thanh dọc */

        /* ================= INPUT FIELD ================= */
        .input-group {
            margin-bottom: 40px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            border: none;
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        .input-group input:focus {
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.3);
        }

        /* ================= SETTINGS (TOGGLES) ================= */
        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-info h4 {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .setting-info p {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Nút gạt Toggle Switch chuẩn iOS */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .switch input { 
            opacity: 0; 
            width: 0; 
            height: 0; 
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: transparent;
            border: 2px solid var(--text-main);
            transition: .4s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: var(--text-main);
            transition: .4s;
            border-radius: 50%;
        }

        .switch input:checked + .slider {
            background-color: var(--text-main);
        }

        .switch input:checked + .slider:before {
            transform: translateX(22px);
            background-color: var(--c-darkest);
        }

        /* ================= BOTTOM BUTTONS ================= */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: auto; /* Đẩy hai nút bấm xuống sát đáy màn hình */
            padding-bottom: 10px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 30px;
            border: none;
            background-color: #ffffff;
            color: #000000;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

    </style>
</head>
<body>

    <div class="profile-container">
        
        <!-- HEADER -->
        <header class="profile-header">
            <a href="#" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h2>Thêm người dùng</h2>
        </header>

        <!-- AVATAR MỚI -->
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <div class="avatar-circle"></div>
                <div class="avatar-badge"></div>
            </div>
        </div>

        <!-- INPUT TÊN -->
        <div class="input-group">
            <input type="text" placeholder="Tên User">
        </div>

        <!-- CÁC CÀI ĐẶT (TOGGLE) -->
        <div class="settings-list">
            
            <div class="setting-item">
                <div class="setting-info">
                    <h4>Dành cho trẻ em</h4>
                    <p>Giới hạn phim T13 trở xuống</p>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <h4>Cài đặt mã khoá</h4>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

        </div>

        <!-- NÚT ĐIỀU HƯỚNG DƯỚI CÙNG -->
        <div class="button-group">
            <button type="button" class="btn">Thoát</button>
            <button type="button" class="btn">Lưu</button>
        </div>

    </div>

</body>
</html>
